---
# Zabbix Handlers

- name: Restart PostgreSQL
  ansible.builtin.systemd:
    name: postgresql
    state: restarted
  become: true

- name: Restart Zabbix Server
  ansible.builtin.systemd:
    name: zabbix-server
    state: restarted
  become: true

- name: Restart Zabbix Agent
  ansible.builtin.systemd:
    name: zabbix-agent
    state: restarted
  become: true

- name: Restart Zabbix Frontend
  ansible.builtin.systemd:
    name: apache2
    state: restarted
  become: true
