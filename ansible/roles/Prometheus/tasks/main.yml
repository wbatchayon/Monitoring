---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Ensure Prometheus user exists
  ansible.builtin.user:
    name: "{{ prometheus_user | default('prometheus') }}"
    state: present
    shell: /bin/false
    createhome: false
  become: true

- name: Create Prometheus directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prometheus_user | default('prometheus') }}"
    group: "{{ prometheus_group | default('prometheus') }}"
    mode: '0755'
  loop:
    - "{{ prometheus_home | default('/var/lib/prometheus') }}"
    - "{{ prometheus_config_dir | default('/etc/prometheus') }}"
    - "{{ prometheus_config_dir | default('/etc/prometheus') }}/rules"
  become: true

- name: Install Prometheus
  ansible.builtin.apt:
    name: prometheus
    state: present
  become: true

- name: Install Node Exporter
  ansible.builtin.apt:
    name: prometheus-node-exporter
    state: present
  become: true

- name: Install Pushgateway
  ansible.builtin.apt:
    name: prometheus-pushgateway
    state: present
  become: true

- name: Deploy Prometheus configuration
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: "{{ prometheus_config_dir | default('/etc/prometheus') }}/prometheus.yml"
    owner: "{{ prometheus_user | default('prometheus') }}"
    group: "{{ prometheus_group | default('prometheus') }}"
    mode: '0644'
  no_log: true
  become: true
  notify: Restart Prometheus

- name: Ensure Prometheus service is enabled
  ansible.builtin.systemd:
    name: prometheus
    state: started
    enabled: true
    daemon_reload: true
  become: true

- name: Ensure Node Exporter service is enabled
  ansible.builtin.systemd:
    name: prometheus-node-exporter
    state: started
    enabled: true
  become: true

- name: Allow Prometheus port
  community.general.ufw:
    rule: allow
    from_ip: "{{ monitoring_network }}"
    port: "{{ prometheus_port }}"
    proto: tcp
  become: true
  failed_when: false

- name: Allow Node Exporter port
  community.general.ufw:
    rule: allow
    from_ip: "{{ monitoring_network }}"
    port: "{{ node_exporter_port }}"
    proto: tcp
  become: true
  failed_when: false

- name: Allow Pushgateway port
  community.general.ufw:
    rule: allow
    from_ip: "{{ monitoring_network }}"
    port: "{{ pushgateway_port }}"
    proto: tcp
  become: true
  failed_when: false

- name: Wait for Prometheus
  ansible.builtin.uri:
    url: "http://localhost:{{ prometheus_port }}"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 15
  delay: 2
  changed_when: false
