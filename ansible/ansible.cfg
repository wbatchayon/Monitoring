[defaults]
# Core settings
inventory = /home/batchayn/Monitoring/ansible/inventory/hosts.ini
host_key_checking = False
timeout = 30
roles_path = /home/batchayn/Monitoring/ansible/roles:/home/batchayn/Monitoring/ansible/playbooks/roles
any_errors_fatal = False
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_facts


# User and sudo settings
become_user = root
force_valid_group_name = ignore
force_handlers = True

# Vault settings for encrypted files
# For GitHub: Use environment variable or create local vault
# export ANSIBLE_VAULT_PASSWORD_FILE=.vault_password_file
vault_password_file = .vault_password_file

# Security & Logging
stdout_callback = yaml
stderr_callback = yaml
callback_whitelist = profile_tasks
# Sanitize logs to prevent secret exposure
no_log_values =
  - password
  - passwd
  - secret
  - token
  - api_token
  - private_key
  - database_password
  - db_password

# SSH settings
pipelining = True
remote_tmp = ~/.ansible/tmp
local_tmp = ~/.ansible/tmp
# Secure SSH settings
deprecation_warnings = False
command_warnings = False

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=accept-new
pipelining = True
retries = 3
control_path = /tmp/ansible-ssh-%%h-%%p-%%r

[inventory]
enable_plugins = yaml,ini,csv,json
parse_gzip_compressed_files = True
