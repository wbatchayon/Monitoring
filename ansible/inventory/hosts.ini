# Ansible Inventory - Use environment variables or edit IPs below

[prometheus]
monitoring-prometheus ansible_host={{ lookup('env', 'PROMETHEUS_IP') | default('192.168.1.110') }}

[elk]
monitoring-elk ansible_host={{ lookup('env', 'ELK_IP') | default('192.168.1.111') }}

[grafana]
monitoring-grafana ansible_host={{ lookup('env', 'GRAFANA_IP') | default('192.168.1.112') }}

[zabbix]
monitoring-zabbix ansible_host={{ lookup('env', 'ZABBIX_IP') | default('192.168.1.113') }}

[monitoring:children]
prometheus
elk
grafana
zabbix

[monitoring:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=yes
ansible_become_method=sudo
environment=production
domain=monitoring.local

[prometheus:vars]
prometheus_ip={{ lookup('env', 'PROMETHEUS_IP') | default('192.168.1.110') }}
elk_ip={{ lookup('env', 'ELK_IP') | default('192.168.1.111') }}
grafana_ip={{ lookup('env', 'GRAFANA_IP') | default('192.168.1.112') }}
zabbix_ip={{ lookup('env', 'ZABBIX_IP') | default('192.168.1.113') }}

[elk:vars]
elk_ip={{ lookup('env', 'ELK_IP') | default('192.168.1.111') }}
elasticsearch_port={{ lookup('env', 'ELASTICSEARCH_PORT') | default('9200') }}
kibana_port={{ lookup('env', 'KIBANA_PORT') | default('5601') }}

[grafana:vars]
grafana_ip={{ lookup('env', 'GRAFANA_IP') | default('192.168.1.112') }}
prometheus_ip={{ lookup('env', 'PROMETHEUS_IP') | default('192.168.1.110') }}
elk_ip={{ lookup('env', 'ELK_IP') | default('192.168.1.111') }}

[zabbix:vars]
zabbix_ip={{ lookup('env', 'ZABBIX_IP') | default('192.168.1.113') }}
zabbix_server_ip={{ lookup('env', 'ZABBIX_IP') | default('192.168.1.113') }}
