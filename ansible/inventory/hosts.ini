# Ansible Inventory - Configuration File
# ========================================
# IP Addresses Configuration
# To customize IPs, either:
# 1. Edit this file directly with your IP addresses
# 2. Set environment variables: export PROMETHEUS_IP=10.0.0.10
#
# Default IP addresses (192.168.1.x):
#   - Prometheus:  192.168.1.110
#   - ELK:        192.168.1.111
#   - Grafana:    192.168.1.112
#   - Zabbix:     192.168.1.113

[prometheus]
monitoring-prometheus ansible_host=192.168.1.110

[elk]
monitoring-elk ansible_host=192.168.1.111

[grafana]
monitoring-grafana ansible_host=192.168.1.112

[zabbix]
monitoring-zabbix ansible_host=192.168.1.113

[monitoring:children]
prometheus
elk
grafana
zabbix

[monitoring:vars]
ansible_user=ubuntu
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_become=yes
ansible_become_method=sudo
environment=production
domain=monitoring.local

[prometheus:vars]
prometheus_ip=192.168.1.110
elk_ip=192.168.1.111
grafana_ip=192.168.1.112
zabbix_ip=192.168.1.113

[elk:vars]
elk_ip=192.168.1.111
elasticsearch_port=9200
kibana_port=5601

[grafana:vars]
grafana_ip=192.168.1.112
prometheus_ip=192.168.1.110
elk_ip=192.168.1.111

[zabbix:vars]
zabbix_ip=192.168.1.113
zabbix_server_ip=192.168.1.113
